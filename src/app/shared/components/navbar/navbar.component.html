<header class="navbar" [class.navbar--scrolled]="isScrolled()">
  <div class="container-page navbar__inner">
    <a class="navbar__brand" routerLink="/" (click)="closeMenu()" aria-label="Solutions Medical Services — Home">
      <img src="images/logo.png" alt="Solutions Medical Services logo" class="navbar__logo" />
    </a>

    <nav class="navbar__links" [class.navbar__links--open]="isMenuOpen()" aria-label="Primary">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
      <a routerLink="/products" routerLinkActive="is-active" (click)="closeMenu()">Products</a>
      <a routerLink="/contact" routerLinkActive="is-active" (click)="closeMenu()">Contact Us</a>
    </nav>

    <button
      class="navbar__toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation menu"
    >
      <i class="bi" [class.bi-x-lg]="isMenuOpen()" [class.bi-list]="!isMenuOpen()"></i>
    </button>
  </div>
</header>
